name: Publish Package

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  Prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1

  Validate:
    needs: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
      - name: Lint
        run: pnpm exec eslint src --ext .ts,.tsx
      - name: Type check
        run: pnpm exec tsc -p tsconfig.build.json --noEmit
      - name: Security audit
        run: pnpm audit --audit-level high
      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: HEAD
          extra_args: --only-verified
      - name: Vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  Test:
    needs: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
      - name: Run tests with coverage
        run: pnpm exec c8 --reporter=lcov --reporter=text mocha --config ./tests/mocha.js
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  Publish:
    needs: [Validate, Test]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Anupheaus'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Bump version
        uses: phips28/gh-action-bump-version@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: pnpm run build
      - name: Pack
        run: pnpm pack
      - name: Publish
        run: |
          TGZ=$(ls anupheaus-common-*.tgz 2>/dev/null | head -1)
          if [ -z "$TGZ" ]; then
            echo "No package tarball found. Contents:"
            ls -la
            exit 1
          fi
          pnpm publish --no-git-checks "$TGZ"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
