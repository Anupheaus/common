name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  PNPM_VERSION: '8.3.1'

jobs:
  Prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  Validate:
    needs: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm exec eslint src --ext .ts,.tsx
      - name: Type check
        run: pnpm exec tsc -p tsconfig.build.json --noEmit
      - name: Security audit
        run: pnpm audit --audit-level high

  Test:
    needs: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm run test-ci

  Publish:
    needs: [Validate, Test]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Anupheaus'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://npm.pkg.github.com/
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Bump version
        uses: phips28/gh-action-bump-version@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: pnpm run build
      - name: Pack
        run: pnpm pack
      - name: Publish
        run: |
          TGZ=$(ls anupheaus-common-*.tgz 2>/dev/null | head -1)
          if [ -z "$TGZ" ]; then
            echo "No package tarball found. Contents:"
            ls -la
            exit 1
          fi
          pnpm publish --no-git-checks "$TGZ"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
